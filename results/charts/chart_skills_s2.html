  function stripHtml(html) {
    var tmp = document.createElement('div');

  function normalizeSkill(txt) {
    var t = (txt || '').replace(/\s*\d+(?:\.\d+)?%\s*$/,'').trim();
    return t.toLowerCase();

  function ensureModal() {
    if (document.getElementById('skill-desc-modal')) return;
    var backdrop = document.createElement('div');

  function openModal(title, body) {
    ensureModal();
    var modal = document.getElementById('skill-desc-modal');
    document.getElementById('skill-desc-title').textContent = title;
    document.getElementById('skill-desc-body').textContent = body;
    modal.style.display = 'flex';
  }

  function attach() {
    // Plotly tables don't emit plotly_click — use native DOM clicks instead
    var container = document.querySelector('.js-plotly-plot');
    if (!container) return;

    container.addEventListener('click', function(ev) {
      var el = ev.target;
      // Skip clicks on Plotly updatemenu buttons (country switchers)
      var node2 = el;
      for (var k = 0; k < 10; k++) {
        if (!node2) break;
        var cls = (node2.getAttribute && node2.getAttribute('class')) || '';
        if (cls.indexOf('updatemenu') >= 0 || cls.indexOf('button') >= 0) return;
        if (node2.getAttribute && node2.getAttribute('data-attr') === 'updatemenus') return;
        node2 = node2.parentElement;
      }
      // Walk up to find a table cell (Plotly renders table cells as <text> inside <g>)
      // or as <td> in some versions
      var cellText = '';
      
      // Try to get text from the clicked element or its parent
      var node = el;
      for (var i = 0; i < 5; i++) {
        if (!node) break;
        var t = (node.textContent || '').trim();
        if (t && t.length > 3 && !t.startsWith('Skill group') && !t.startsWith('On-farm top') && !t.startsWith('Off-farm top')) {
          cellText = t;
          break;
        }
        node = node.parentElement;
      }

      if (!cellText || cellText.length < 3) return;

      // Extract the skill name (remove percentage)
      var key = cellText.replace(/\s*\d+(?:\.\d+)?%\s*$/, '').trim().toLowerCase();
      // Also handle cases where % is on its own line
      key = key.replace(/^\d+(?:\.\d+)?%\s*/, '').trim();

      if (!key || key.length < 3) return;
      // Skip if it's a group label like "s1 communication"
      if (/^s\d\s/i.test(key)) return;

      var desc = SKILL_DESC[key];
      if (!desc) {
        // Try partial match
        var keys = Object.keys(SKILL_DESC);
        for (var j = 0; j < keys.length; j++) {
          if (keys[j].indexOf(key) === 0 || key.indexOf(keys[j]) === 0) {
            desc = SKILL_DESC[keys[j]];
            break;
          }
        }
      }
      if (!desc) desc = 'Description not available in ESCO metadata.';

      var title = cellText.replace(/\s*\d+(?:\.\d+)?%\s*$/, '').trim();
      title = title.replace(/^\d+(?:\.\d+)?%\s*/, '').trim();
      openModal(title, desc);
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', attach);
  } else {
    setTimeout(attach, 200);
  }
  window.addEventListener('load', function() { setTimeout(attach, 300); });})();
